<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>인기글 트래커</title>
<style>
  :root{--bg:#0f1420;--panel:#171d2b;--line:#26304a;--txt:#e6ebf5;--mut:#8a97b5;--accent:#4c8dff;--pop:#ffb020;--new:#2ec26a}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Malgun Gothic",sans-serif;background:var(--bg);color:var(--txt)}
  header{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  header h1{font-size:17px;margin:0}
  .dot{width:9px;height:9px;border-radius:50%;background:#666;display:inline-block;margin-right:6px}
  .dot.on{background:var(--new);box-shadow:0 0 8px var(--new)}
  .stats{margin-left:auto;display:flex;gap:16px;color:var(--mut);font-size:13px}
  .stats b{color:var(--txt)}
  .banner{display:none;padding:10px 20px;background:#3a1414;color:#ff9a9a;border-bottom:1px solid #6b2020;font-size:13px}
  .banner.show{display:block}
  .banner code{background:#00000040;padding:1px 6px;border-radius:4px;color:#ffd0d0}
  .bar{display:flex;gap:10px;padding:12px 20px;align-items:center;flex-wrap:wrap}
  select,input,button{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:7px 10px;font-size:13px}
  button{cursor:pointer} button:hover{border-color:var(--accent)}
  .cols{display:grid;grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr);gap:14px;padding:0 20px 16px}
  @media(max-width:1100px){.cols{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;min-width:0;display:flex;flex-direction:column}
  .panel .phd{padding:9px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:var(--panel);flex:0 0 auto}
  .panel .phd h2{margin:0;font-size:15px} .panel .phd .sub{color:var(--mut);font-size:11px}
  .panel .cnt{margin-left:auto;color:var(--mut);font-size:12px}
  .tabs{display:flex;gap:6px}
  .tab{padding:4px 11px;border-radius:14px;font-size:12.5px;background:#202a3f;color:var(--mut);border:1px solid transparent;cursor:pointer}
  .tab.on{background:var(--accent);color:#fff;font-weight:600}
  .scroll{height:calc(100vh - 168px);overflow:auto}
  @media(max-width:1100px){.scroll{height:76vh}}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top;white-space:nowrap}
  th{color:var(--mut);font-weight:600;position:sticky;top:0;background:#1b2233;z-index:1}
  tr.article{cursor:pointer} tr.article:hover{background:#1c2536}
  tr.hot1{background:rgba(255,176,32,.06)} tr.hot2{background:rgba(255,140,20,.13)}
  tr.hot3{background:rgba(255,80,40,.19);box-shadow:inset 3px 0 0 #ff5a2a}
  .fire{font-size:11px;letter-spacing:-2px}
  .tag{font-size:10px;padding:2px 6px;border-radius:9px;background:#243049;color:#a9c0ff}
  .tag.pop{background:#3a2c08;color:var(--pop)} .tag.del{background:#4a1c1c;color:#ff9a9a}
  .tag.used{background:#173a2a;color:#7ee0a8;border:1px solid #2e6b4a}
  .tag.surge{background:#3a2408;color:#ffc14d;border:1px solid #6b4a1a}
  tr.usedmark td{opacity:.5}
  body.hideused tr.usedmark{display:none}
  .cafe{color:#bcd0ff;font-weight:600}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .delta{color:var(--new);font-weight:600}
  .title{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  tr.deleted td{opacity:.5;text-decoration:line-through}
  tr.datesep td{background:#131a28;color:var(--mut);font-size:11px;text-align:center;padding:4px;letter-spacing:1px;position:sticky;top:29px}
  /* ── 모바일: 상단 탭 전환 + 카드형 ── */
  .mtabs{display:none}
  @media(max-width:1100px){
    .mtabs{display:flex;gap:8px;padding:8px 14px;position:sticky;top:57px;background:var(--bg);z-index:15;border-bottom:1px solid var(--line)}
    .mtab{flex:1;padding:10px;border-radius:8px;background:#202a3f;color:var(--mut);border:1px solid var(--line);font-size:14px}
    .mtab.on{background:var(--accent);color:#fff;font-weight:600}
    .panel.mhide{display:none}
    .cols{padding:0 10px 20px}
    .scroll{height:calc(100vh - 212px)}
  }
  @media(max-width:760px){
    .panel .phd{flex-wrap:wrap;gap:6px}
    thead{display:none}
    table,tbody{display:block}
    tr.article{display:block;padding:11px 13px}
    tr.article td{display:inline;padding:0;border:0;white-space:normal;vertical-align:baseline}
    tr.article td:nth-child(1),tr.article td:nth-child(5),tr.article td:nth-child(8){display:none}
    tr.article td:nth-child(2){font-size:11.5px;margin-right:6px}
    tr.article td:nth-child(3){font-size:11px}
    tr.article td:nth-child(4){display:block;font-size:15.5px;font-weight:600;line-height:1.35;max-width:none;margin:5px 0 6px}
    tr.article td:nth-child(6),tr.article td:nth-child(7){display:inline-block;color:var(--mut);font-size:12.5px}
    tr.article td:nth-child(6)::before{content:"👁 "}
    tr.article td:nth-child(7)::before{content:"    💬 "}
    tr.datesep td{position:static;display:block}
    .card .hd .more{flex:1;padding:12px;font-size:13px}
  }
  @keyframes flash{from{background:#123a24}to{background:transparent}}
  tr.flash{animation:flash 2.4s ease-out}
  .morewrap{padding:10px;text-align:center;flex:0 0 auto;border-top:1px solid var(--line)}
  .more{background:#202a3f;padding:7px 20px;border-radius:8px} .more[disabled]{opacity:.4;cursor:default}
  #toast{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:8px;z-index:50}
  .t{background:var(--panel);border:1px solid var(--new);border-left:4px solid var(--new);padding:10px 14px;border-radius:8px;font-size:13px;max-width:340px;box-shadow:0 6px 20px #0008}
  .t.hot{border-color:var(--pop);border-left-color:var(--pop)}
  #modal{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  #modal.show{display:flex}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;max-width:760px;width:100%;max-height:88vh;overflow:auto}
  .card .hd{padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
  .card .hd h2{margin:0 0 6px;font-size:17px}
  .card .meta{color:var(--mut);font-size:12px;display:flex;gap:14px;flex-wrap:wrap}
  .card .body{padding:16px 20px;white-space:pre-wrap;line-height:1.6;font-size:14px;border-bottom:1px solid var(--line)}
  .cmts{padding:12px 20px} .cmt{padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .cmt .who{color:var(--accent);font-weight:600;margin-right:8px} .cmt.reply{padding-left:20px;color:var(--mut)}
  .x{float:right;cursor:pointer;color:var(--mut);font-size:20px;line-height:1}
  a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>📈 인기글 트래커</h1>
  <span><span class="dot" id="dot"></span><span id="conn" style="font-size:12px;color:var(--mut)">연결 중…</span></span>
  <div class="stats" id="stats"></div>
</header>

<div class="banner" id="banner">⚠ <b>세션 만료</b> — 네이버 로그인이 풀렸습니다. 서버 PC 터미널에서 <code>python -m src.poc.cli capture --account 내네이버아이디</code> 를 다시 실행하세요.</div>

<div class="bar">
  <input id="q" placeholder="제목 검색…" size="26"/>
  <button onclick="reloadAll()">검색</button>
  <button onclick="reloadAll()">↻ 새로고침</button>
  <button onclick="showAccess()">👥 접속현황</button>
  <label style="color:var(--mut);font-size:12px;display:flex;align-items:center;gap:4px"><input type="checkbox" id="hideused" onchange="document.body.classList.toggle('hideused', this.checked)"> 미사용만 보기</label>
  <span style="color:var(--mut);font-size:12px">🔥 호응글 · ✓ 사용됨</span>
</div>

<div class="mtabs" id="mtabs">
  <button class="mtab on" id="mtab-pop" onclick="setMobilePanel('pop')">🔥 인기글</button>
  <button class="mtab" id="mtab-gen" onclick="setMobilePanel('gen')">⚡ 일반글</button>
</div>

<div class="cols">
  <!-- 인기글 -->
  <section class="panel pop">
    <div class="phd"><h2>🔥 인기글</h2><span class="sub">매일 2·16시 수집·누적</span><span class="cnt" id="cnt-pop"></span></div>
    <div class="scroll"><table>
      <thead><tr><th>감지</th><th>카페</th><th>보드</th><th>제목</th><th>작성자</th><th class="num">조회</th><th class="num">댓글</th><th class="num">증가</th></tr></thead>
      <tbody id="rows-pop"></tbody>
    </table></div>
    <div class="morewrap"><button class="more" id="more-pop" onclick="loadMore('pop')">더보기</button></div>
  </section>
  <!-- 일반글 (탭) -->
  <section class="panel gen mhide">
    <div class="phd">
      <div class="tabs">
        <span class="tab on" id="tab-latest" onclick="setGenOrder('latest')">⚡ 최신순</span>
        <span class="tab" id="tab-surge" onclick="setGenOrder('surge')">🚀 급상승</span>
        <span class="tab" id="tab-hot" onclick="setGenOrder('hot')">👍 호응순</span>
      </div>
      <span class="sub" id="gen-sub">작성시간 최신순</span>
      <span class="cnt" id="cnt-gen"></span>
    </div>
    <div class="scroll"><table>
      <thead><tr><th>감지</th><th>카페</th><th>보드</th><th>제목</th><th>작성자</th><th class="num">조회</th><th class="num">댓글</th><th class="num">증가</th></tr></thead>
      <tbody id="rows-gen"></tbody>
    </table></div>
    <div class="morewrap"><button class="more" id="more-gen" onclick="loadMore('gen')">더보기</button></div>
  </section>
</div>

<div id="toast"></div>
<div id="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="card" id="card"></div></div>

<script>
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const PAGE = 100;
let rowsById = {};
let curDetail = null;                  // 현재 상세 모달의 글 (원고복사용)
let genOrder = "latest";              // 일반글 탭: latest | hot
const state = { pop:{type:"popular",loaded:0}, gen:{type:"general",loaded:0} };

function boardTag(boards){
  if(!boards) return "";
  const t=[];
  if(boards.includes("popular")) t.push('<span class="tag pop">인기글</span>');
  if(/menu:/.test(boards)) t.push('<span class="tag">일반</span>');
  return t.join(" ");
}
function dayLabel(ms){
  const d=new Date(ms), t=new Date();
  const diff=Math.round((new Date(t.getFullYear(),t.getMonth(),t.getDate())-new Date(d.getFullYear(),d.getMonth(),d.getDate()))/86400000);
  const base=`${d.getMonth()+1}/${d.getDate()}`;
  return diff===0?base+" (오늘)":diff===1?base+" (어제)":diff===2?base+" (그제)":base;
}
function sepHtml(label){ return `<tr class="datesep"><td colspan="8">─── ${label} ───</td></tr>`; }
function minsAgo(ms){ if(!ms) return ""; const m=Math.max(0,Math.round((Date.now()-ms)/60000)); return m<60?m+"분 전":Math.floor(m/60)+"시간 전"; }

function rowHtml(r){
  const key=r.cafe_id+"_"+r.article_id;
  const delta=(r.revisit_done && r.read_delta!=null)?`<span class="delta">+${r.read_delta}</span>`:'<span style="color:var(--mut)">–</span>';
  const del=r.status==="deleted";
  const fire=r.tier?`<span class="fire" title="호응점수 ${r.hot_score}">${"🔥".repeat(r.tier)}</span> `:"";
  let surge="";
  if("surge_z" in r){ const rt=r.surge_ratio!=null?`평균 ${r.surge_ratio}배`:"급상승"; surge=`<span class="tag surge">🚀 ${rt} · ${minsAgo(r.write_ts)}</span> `; }
  const used=r.used?`<span class="tag used" title="${esc(r.used_by||'')} 사용">✓ ${esc(r.used_by||'사용')}</span>`:"";
  const cls="article "+(del?"deleted ":"")+(r.used?"usedmark ":"")+(r.tier?("hot"+r.tier):"");
  return `<tr class="${cls}" data-id="${key}" onclick="detail(${r.cafe_id},${r.article_id})">
    <td style="color:var(--mut)">${r.seen_str||""}</td>
    <td class="cafe">${esc(r.cafe_name||"")}</td>
    <td>${del?'<span class="tag del">삭제</span>':boardTag(r.boards)}${used}</td>
    <td class="title" title="${esc(r.title)}">${fire}${surge}${esc(r.title)}</td>
    <td style="color:var(--mut)">${esc(r.writer_nickname)}</td>
    <td class="num">${r.read_cnt??""}</td>
    <td class="num">${r.comment_cnt??""}</td>
    <td class="num" data-delta>${delta}</td></tr>`;
}

async function get(type, order, offset, limit){
  const q=encodeURIComponent($("#q").value);
  const r=await fetch(`/api/articles?type=${type}&order=${order}&q=${q}&offset=${offset}&limit=${limit}`);
  return r.json();
}
function orderOf(key){ return key==="gen"?genOrder:"latest"; }

function renderRows(key, rows, append){
  const tb=$("#rows-"+key), order=orderOf(key);
  let html="", lastDay=append?(tb.dataset.lastday||""):"";
  for(const r of rows){
    rowsById[r.cafe_id+"_"+r.article_id]=r;
    if(order==="latest" && r.write_ts){ const dl=dayLabel(r.write_ts); if(dl!==lastDay){ html+=sepHtml(dl); lastDay=dl; } }
    html+=rowHtml(r);
  }
  if(append) tb.insertAdjacentHTML("beforeend", html); else tb.innerHTML=html;
  tb.dataset.lastday=lastDay;
}
async function reload(key){
  const st=state[key];
  const limit=Math.max(PAGE, st.loaded||PAGE);   // 확장 상태 유지하며 갱신
  const data=await get(st.type, orderOf(key), 0, limit);
  renderRows(key, data.rows, false);
  st.loaded=data.rows.length; setMore(key, data.has_more);
  $("#cnt-"+key).textContent=`${st.loaded}건`;
}
async function loadMore(key){
  const st=state[key];
  const data=await get(st.type, orderOf(key), st.loaded, PAGE);
  renderRows(key, data.rows, true);
  st.loaded+=data.rows.length; setMore(key, data.has_more);
  $("#cnt-"+key).textContent=`${st.loaded}건`;
}
function setMore(key, has){ const b=$("#more-"+key); b.disabled=!has; b.textContent=has?"더보기":"끝"; }
async function reloadAll(){ rowsById={}; await Promise.all([reload("pop"), reload("gen")]); stats(); }

function setMobilePanel(p){
  document.querySelector(".panel.pop").classList.toggle("mhide", p!=="pop");
  document.querySelector(".panel.gen").classList.toggle("mhide", p!=="gen");
  $("#mtab-pop").classList.toggle("on", p==="pop");
  $("#mtab-gen").classList.toggle("on", p==="gen");
}
function setGenOrder(o){
  genOrder=o;
  for(const [id,v] of [["tab-latest","latest"],["tab-surge","surge"],["tab-hot","hot"]])
    $("#"+id).classList.toggle("on", o===v);
  $("#gen-sub").textContent = o==="surge" ? "최근 1시간 · 게시판 평균 대비 급상승"
    : o==="hot" ? "최근 24시간 · 호응(인기)점수순" : "작성시간 최신순";
  state.gen.loaded=0; reload("gen");
}

async function stats(){
  const s=await (await fetch("/api/stats")).json();
  $("#stats").innerHTML=`글 <b>${s.articles}</b> · 댓글 <b>${s.comments}</b> · 재방문 <b>${s.revisited}</b> · 삭제 <b>${s.deleted??0}</b>`;
  setSession(s.session_ok!==false);
}
function setSession(ok){ $("#banner").classList.toggle("show",!ok); }

async function detail(cafe,art){
  const d=await (await fetch(`/api/articles/${cafe}/${art}`)).json();
  curDetail=d;
  const cmts=(d.comments||[]).map(c=>`<div class="cmt ${c.is_reply?'reply':''}"><span class="who">${esc(c.writer_nickname)}</span>${esc(c.content)}</div>`).join("")||'<div style="color:var(--mut)">댓글 없음</div>';
  $("#card").innerHTML=`<div class="hd"><span class="x" onclick="closeModal()">✕</span>
    <h2>${esc(d.title)}</h2>
    <div class="meta"><span class="cafe">${esc(d.cafe_name||"")}</span><span>👤 ${esc(d.writer_nickname)}</span><span>👁 ${d.first_read_count}${d.revisit_done?` → ${d.second_read_count} (+${d.read_delta})`:''}</span><span>💬 ${d.first_comment_count}</span><span>${d.write_str}</span>
    <a href="https://cafe.naver.com/ca-fe/cafes/${d.cafe_id}/articles/${d.article_id}" target="_blank">원문↗</a></div>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="more" style="border-color:var(--accent)" onclick="copyManuscript()">📋 원고복사 (제목·본문·댓글)</button>
      <button class="more" id="usebtn" onclick="toggleUsed()">${d.used?'☑ 사용됨 해제':'⬜ 사용함 표시'}</button>
    </div></div>
    <div class="body">${esc(d.content_text)||'<span style="color:var(--mut)">본문 없음</span>'}</div>
    <div class="cmts"><b>댓글 ${(d.comments||[]).length}</b>${cmts}</div>`;
  $("#modal").classList.add("show");
}
function copyManuscript(){
  const d=curDetail; if(!d) return;
  const cmts=(d.comments||[]).slice(0,10).map((c,i)=>`${i+1}. ${(c.content||"").trim()}`).join("\n");
  const text=`제목 ; ${d.title||""}\n\n본문 ;\n${(d.content_text||"").trim()}\n\n댓글 ;\n${cmts}`;
  copyText(text);
}
async function toggleUsed(){
  const d=curDetail; if(!d) return;
  const newUsed=!d.used;
  const r=await fetch(`/api/articles/${d.cafe_id}/${d.article_id}/use`,
    {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({used:newUsed})});
  if(!r.ok){ toast("표시 실패 (로그인 확인)"); return; }
  d.used=newUsed;
  const b=$("#usebtn"); if(b) b.innerHTML=newUsed?'☑ 사용됨 해제':'⬜ 사용함 표시';
  toast(newUsed?"✅ '사용됨'으로 표시했어요":"표시를 해제했어요");
}
function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(()=>toast("📋 원고가 클립보드에 복사됐어요")).catch(()=>fallbackCopy(text));
  } else { fallbackCopy(text); }
}
function fallbackCopy(text){
  const ta=document.createElement("textarea"); ta.value=text;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); toast("📋 원고가 클립보드에 복사됐어요"); }
  catch(e){ toast("복사 실패 — 본문을 직접 선택해 복사하세요"); }
  document.body.removeChild(ta);
}
async function showAccess(){
  const r=await fetch("/api/access");
  if(r.status===403){ toast("👥 접속현황은 관리자 계정만 볼 수 있어요"); return; }
  const d=await r.json();
  const rows=(d.groups||[]).map(g=>`<tr><td class="cafe">${esc(g.group)}</td><td class="num">${g.people}</td><td class="num" style="color:var(--new)">${g.active}</td><td class="num">${g.requests}</td><td style="color:var(--mut)">${g.last_str||""}</td></tr>`).join("")||'<tr><td colspan="5" style="color:var(--mut)">아직 접속 기록 없음</td></tr>';
  $("#card").innerHTML=`<div class="hd"><span class="x" onclick="closeModal()">✕</span><h2>👥 그룹별 접속 현황</h2>
    <div class="meta">인원=고유 IP · 활성=최근 5분 접속 · 서버 재시작 시 초기화</div></div>
    <div style="padding:12px 20px"><table>
      <thead><tr><th>그룹</th><th class="num">인원</th><th class="num">활성</th><th class="num">요청수</th><th>마지막 접속</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  $("#modal").classList.add("show");
}
function closeModal(){ $("#modal").classList.remove("show"); }
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
function toast(msg,hot){ const el=document.createElement("div"); el.className="t"+(hot?" hot":""); el.innerHTML=msg; $("#toast").appendChild(el); setTimeout(()=>el.remove(),6000); }

function connect(){
  const ws=new WebSocket((location.protocol==="https:"?"wss":"ws")+"://"+location.host+"/ws");
  ws.onopen =()=>{$("#dot").classList.add("on"); $("#conn").textContent="실시간 연결됨";};
  ws.onclose=()=>{$("#dot").classList.remove("on"); $("#conn").textContent="끊김 — 재연결 중…"; setTimeout(connect,2000);};
  ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    if(m.type==="new"){
      const isPop=(m.board_key||"").includes("popular");
      if(isPop){
        const r={cafe_id:m.cafe_id,article_id:m.article_id,title:m.title,writer_nickname:m.writer,cafe_name:m.cafe_name,
          boards:m.board_key,read_cnt:m.read_count,comment_cnt:m.comment_count,read_delta:null,revisit_done:0,tier:0,
          seen_str:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})};
        rowsById[r.cafe_id+"_"+r.article_id]=r;
        $("#rows-pop").insertAdjacentHTML("afterbegin", rowHtml(r));
        $("#rows-pop").firstElementChild.classList.add("flash");
      } else if(genOrder==="latest"){
        // 최신순일 때만 상단에 삽입 (호응순은 자동 새로고침으로 반영)
        const r={cafe_id:m.cafe_id,article_id:m.article_id,title:m.title,writer_nickname:m.writer,cafe_name:m.cafe_name,
          boards:m.board_key,read_cnt:m.read_count,comment_cnt:m.comment_count,read_delta:null,revisit_done:0,tier:0,
          seen_str:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})};
        rowsById[r.cafe_id+"_"+r.article_id]=r;
        $("#rows-gen").insertAdjacentHTML("afterbegin", rowHtml(r));
        $("#rows-gen").firstElementChild.classList.add("flash");
      }
      toast(`${isPop?'🔥':'🆕'} <b>${esc(m.cafe_name||'')}</b> · ${esc(m.board_name)}<br>${esc(m.title)} <span style="color:var(--mut)">(조회 ${m.read_count})</span>`);
      stats();
    } else if(m.type==="revisit"){
      const tr=$(`tr[data-id="${m.cafe_id}_${m.article_id}"]`);
      if(tr) tr.querySelector("[data-delta]").innerHTML=`<span class="delta">+${m.read_delta}</span>`;
    } else if(m.type==="deleted"){
      const tr=$(`tr[data-id="${m.cafe_id}_${m.article_id}"]`);
      if(tr){ tr.classList.add("deleted"); tr.querySelector("td:nth-child(3)").innerHTML='<span class="tag del">삭제</span>'; }
    } else if(m.type==="used"){
      const key=m.cafe_id+"_"+m.article_id, r=rowsById[key];
      if(r){ r.used=m.used; r.used_by=m.used_by; }
      const tr=$(`tr[data-id="${key}"]`);
      if(tr && r) tr.outerHTML=rowHtml(r);          // 뱃지·딤 즉시 반영
      if(curDetail && curDetail.cafe_id===m.cafe_id && curDetail.article_id===m.article_id){
        curDetail.used=m.used; const b=$("#usebtn"); if(b) b.innerHTML=m.used?'☑ 사용됨 해제':'⬜ 사용함 표시';
      }
    } else if(m.type==="session"){
      setSession(m.ok); toast(m.ok?"✅ 세션 정상 복구":"⚠ 세션 만료 — 재로그인 필요");
    }
  };
}

reloadAll(); connect();
setInterval(stats, 15000);
setInterval(()=>{ reload("gen"); reload("pop"); }, 45000);   // 점수·카운트 자동 갱신
</script>
</body>
</html>
